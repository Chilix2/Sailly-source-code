# Phase 2.1 — Order start

id: phase2_test_2_1_order_start
phase: 2
description: "Caller starts an order; bot routes through order profile, not reservation"

caller:
  goal: |
    Du möchtest etwas bestellen. Du nimmst zweimal Bibimbap und einmal Bulgogi zum Abholen.
    Dein Name ist Wagner. Nach der Zusammenfassung bestätigst du.
  identity:
    name: "Wagner"
    phone: "+4915100000002"
  patience_turns: 10
  hesitation: normal

expectations:
  must_fire_after_confirmation: ["create_order"]
  must_not_fire_before_confirmation: ["create_reservation"]
  forbid_phrases:
    - "[tool:"
    - "technisches problem"

release_thresholds:
  internal_alpha: optional
  supervised_beta: required
  production: required
