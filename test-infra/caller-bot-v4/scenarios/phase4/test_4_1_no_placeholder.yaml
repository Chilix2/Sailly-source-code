# Phase 4.1 — No placeholder text

id: phase4_test_4_1_no_placeholder
phase: 4
description: "Bot never outputs placeholder like 'Ihrem Namen' or {name}"

caller:
  goal: "Reserviere einen Tisch."
  identity:
    name: "Test"
  patience_turns: 6
  hesitation: low

expectations:
  forbid_phrases:
    - "ihrem namen"
    - "{name}"
    - "{date}"
    - "{time}"
    - "{{ "
    - " }}"

release_thresholds:
  internal_alpha: required
  supervised_beta: required
  production: required
