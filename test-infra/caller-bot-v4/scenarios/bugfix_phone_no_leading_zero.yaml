# Bug Fix 2: Phone number prepending leading zero when caller omits it
# Caller says "179 345 67 89" (9 digits) instead of "0179 345 67 89" (10 digits)
# Expectation: system prepends "0" and stores as "0179 345 67 89"

id: bugfix_phone_no_leading_zero
phase: bugfix
description: "Phone number correctly prepends leading zero when caller omits it"

caller:
  goal: "Reserviere einen Tisch aber gib die Telefonnummer ohne die führende 0."
  utterance_sequence:
    - "Hallo, ich möchte einen Tisch für zwei reservieren."
    - "Montag"
    - "um 20 Uhr"
    - "Anna Schmidt"
    - "179 345 67 89"  # Missing leading zero — system should add it
  identity:
    name: "Anna Schmidt"
    phone: "+4915900000000"
  patience_turns: 10
  hesitation: low

expectations:
  # Should accept the phone number and not reject it
  must_not_contain:
    - "telefonnummer ungültig"
    - "telefonnummer nicht verstanden"
    - "nochmal die telefonnummer"
  # Should proceed to readback with the reservation accepted
  must_contain_one_of:
    - "bestätigung"
    - "zusammenfassung"
    - "stimmt das"

release_thresholds:
  internal_alpha: required
  supervised_beta: required
  production: required
