tenant_id: pizzeria_napoli
industry: restaurant

# Twilio routing — update with real number before go-live.
twilio_numbers: []

system_prompt: |
  ## PERSONA
  Du bist Sally, Rezeptionistin der Pizzeria Napoli in Köln.
  Freundlich, kompetent, Sie-Form. Kurze Sätze. Am Telefon zählt jede Sekunde.

  ANTWORTE AUSSCHLIESSLICH AUF DEUTSCH.

  ## RULES
  ### Restaurant Info
  - Öffnungszeiten: Mo–So 11:30–23:00
  - Adresse: Hohe Straße 12, 50667 Köln
  - Küche: Italienisch (Pizza aus dem Holzofen, Pasta, Antipasti)

voice: Kore
model: gemini-2.5-flash

audio:
  stt_model: "flux-general-multi"
  stt_endpointing_ms: 600
  eot_threshold: 0.7
  eager_eot_threshold: 0.5

tools:
  - name: check_availability
    description: Prüft Tischverfügbarkeit UND Bestellstatus/Wartezeiten.
    parameters:
      type: object
      properties:
        date:     { type: string, description: "YYYY-MM-DD (optional)" }
        time:     { type: string, description: "HH:MM (optional)" }
        party_size: { type: integer, description: "Anzahl der Personen" }
      required: ["party_size"]

  - name: create_reservation
    description: Erstelle eine bestätigte Reservierung.
    parameters:
      type: object
      properties:
        date:       { type: string }
        time:       { type: string }
        party_size: { type: integer }
        name:       { type: string }
        phone:      { type: string }
      required: ["date", "time", "party_size", "name", "phone"]

  - name: get_menu
    description: Hole die Speisekarte oder eine Kategorie.
    parameters:
      type: object
      properties:
        category: { type: string, description: "pizza, pasta, antipasti, dolci, alle" }
      required: []

  - name: create_order
    description: Erstelle eine Takeaway/Delivery-Bestellung.
    parameters:
      type: object
      properties:
        name: { type: string }
        phone: { type: string }
        messaging_phone: { type: string }
        order_items: { type: string }
        order_type: { type: string, description: "takeaway|delivery" }
        payment_method: { type: string }
        total_price: { type: number }
        delivery_address: { type: string }
      required: ["name", "phone", "messaging_phone", "order_items", "order_type", "payment_method", "total_price"]

  - name: verify_address
    description: Validiert eine Lieferadresse (Google Geocoding).
    parameters:
      type: object
      properties:
        address: { type: string }
        city:    { type: string, description: "Standard: Köln" }
      required: ["address"]

  - name: end_call
    description: Beendet das Gespräch.
    parameters:
      type: object
      properties:
        reason: { type: string }
      required: ["reason"]

  - name: transfer_to_human
    description: Leitet den Anruf weiter.
    parameters:
      type: object
      properties:
        reason: { type: string }
      required: ["reason"]

