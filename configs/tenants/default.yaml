# Localization
locale: de-DE

# Compliance
ai_disclosure_text: "Hallo! Ich bin Sailly, die digitale KI-Assistentin von DOBOO. Wie kann ich Ihnen helfen?"

# Storage isolation
gcs_prefix: "tenants/doboo"

# ── Phase 6: Tool configuration ────────────────────────────────────────────────

# transfer_to_human: target phone number for warm transfer (Twilio dial)
transfer_to_phone: "+492281234567"  # tenant-specific fallback

# max_party_size for reservation validation (used by validate_party_size)
reservation:
  max_party_size: 12

# max_order_total_eur: monetary cap for create_order (Phase 6 cap-200 decision)
max_order_total_eur: 200

# delivery zone configuration (optional — absence means no zone restriction)
delivery:
  zone_polygon: []  # list of [lat, lng] pairs; empty = no restriction

# faqs: static FAQ entries for the faq handler (static-with-llm-fallback decision)
# Each entry has keywords (for matching) and an answer (German).
faqs:
  - keywords: ["öffnungszeiten", "geöffnet", "offen", "wann", "zeiten", "aufmachen"]
    answer: "Wir haben Montag bis Donnerstag von 11:30 bis 21:30 Uhr geöffnet, Freitag von 11:30 bis 14:00 und von 18:00 bis 21:30 Uhr, Samstag von 18:00 bis 21:30 Uhr. Sonntag sind wir geschlossen."
  - keywords: ["reservierung", "tisch buchen", "platz reservieren", "tischreservierung"]
    answer: "Reservierungen nehmen wir telefonisch, per E-Mail oder direkt über unsere Website entgegen. Ich helfe Ihnen gerne, einen Tisch zu reservieren."
  - keywords: ["parken", "parkplatz", "parkhaus", "auto"]
    answer: "Das Parkhaus 'Friedrichstraße' ist etwa 100 Meter entfernt. Straßenparkplätze sind ebenfalls in der Nähe verfügbar."
  - keywords: ["lieferung", "liefern", "lieferservice", "bestellen", "bringt", "delivery"]
    answer: "Wir bieten Lieferung innerhalb von Bonn an. Ich kann gerne eine Lieferbestellung für Sie aufnehmen."
