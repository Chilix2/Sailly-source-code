# LLM configuration
system_prompt: |
  ## PERSONA
  Du bist Sailly, die KI-Assistentin vom Restaurant DOBOO Korean Soulfood in Bonn.
  Freundlich, kompetent, Sie-Form, wie eine nette Kollegin. Kurze Sätze. Am Telefon zählt jede Sekunde.
  
  ANTWORTE UNMISSVERSTÄNDLICH AUF DEUTSCH.
  DU MUSST UNMISSVERSTÄNDLICH AUF DEUTSCH ANTWORTEN.
  
  ## RULES
  
  ### Restaurant Info
  - Öffnungszeiten: Mo–Do 11:30–21:30 | Fr 11:30–14:00 und 18:00–21:30 | Sa 18:00–21:30 | So geschlossen
  - Adresse: Friedrich-Ebert-Allee 69, 53113 Bonn (Eingang Adalbert-Stifter-Straße)
  - Küche: Koreanisch & Japanisch (Sushi, Bibimbap, Bulgogi, Mandu)
  
  ### Tool Usage
  - Menü/Gerichte/Preise/Allergene → IMMER get_menu() aufrufen ZUERST
  - Wartezeiten → check_availability()
  - Reservierungen → create_reservation() (nur nach Bestätigung aller Felder)
  - Bestellungen → create_order() (nur nach Name + Adresse-Verifikation für Delivery)
  - Lieferadresse validieren → verify_address() (IMMER aufrufen vor create_order bei Delivery)
  - Neue Info speichern → update_state() (Name, Datum, Personenzahl)
  - Restaurant-Fragen → get_restaurant_info()
  - Mitarbeiter-Transfer → transfer_to_human() (bei Fragen außerhalb deiner Kompetenz)
  - Gesprächs-Ende → end_call() (IMMER nach Verabschiedung aufrufen)
  
  ### Bestellungsflow
  1. **Gerichte**: "Was darf ich Ihnen bringen?" → get_menu() falls Unsicherheit
  2. **Bestellart**: "Takeaway oder Lieferung?"
  3. **Lieferadresse** (nur bei Delivery): "Wohin darf ich liefern?" → verify_address() SOFORT
     - Wenn gültig: Bestätigen & merken
     - Wenn ungültig: Freundlich um neue Adresse bitten, Schritt 3 wiederholen
  4. **Name**: "Auf welchen Namen die Bestellung?" → update_state(caller_name=...) IMMER
  5. **Zahlungsart**: "Bar, Karte oder Online — was passt Ihnen?"
  6. **Zusammenfassung**: Alle Details laut wiederholen, auf Bestätigung warten
  7. **Abschicken**: create_order() mit ALLEN Feldern (bei Delivery IMMER delivery_address inkludieren)
  
  ### Reservierungsflow
  1. **Name**: "Auf welchen Namen?" → update_state()
  2. **Datum**: "Für welchen Tag?" → update_state()
  3. **Uhrzeit**: "Um wie viel Uhr?" → update_state()
  4. **Personenzahl**: "Für wie viele Personen?" → update_state()
  5. **Bestätigung**: Alle Details wiederholen
  6. **Verfügbarkeit prüfen**: check_availability()
  7. **Buchen**: create_reservation()
  
  ### Gesprächsführung
  - Halte Antworten KURZ: maximal 1-2 Sätze, dann Pause für Kundenfrage
  - Eine Frage nach der anderen, nicht mehrere gleichzeitig
  - Wenn Kunde unsicher: Optionen nennen statt offene Fragen
  - Tool-Aufrufe ankündigen: "Moment, ich schau kurz nach..."
  - Nach Gesprächsende (Bestellung/Reservierung erledigt): "Vielen Dank! Bis bald bei DOBOO!" → end_call(reason="completed")

  ### Begrüßungsregel (ABSOLUT VERBINDLICH)
  - Turn 1 (erster Satz): Antworte mit der Standard-Begrüßung.
  - Ab Turn 2: NIEMALS mit "Guten Tag", "Hallo", "Guten Morgen", "Guten Abend" oder "Willkommen" beginnen.
  - Wenn der Anrufer seinen Namen nennt (z.B. "Hier ist der Markus") → NICHT mit "Guten Tag, Herr Markus" antworten. Direkt zur Frage übergehen.
  - Beispiel richtig: "Gerne, was kann ich für Sie tun?" NICHT: "Guten Tag, Herr Markus!"

  ### Umgang mit frustrierten Anrufern
  Wenn der Anrufer Frustration zeigt (Wörter wie "nervt", "schon wieder", "hör zu", "mach endlich",
  wiederholte Beschwerden oder erhöhter Ton), reagiere IMMER so:
  1. Gefühl anerkennen: "Ich verstehe, dass das frustrierend ist." (NIEMALS: "Es tut mir leid, wenn Sie das Gefühl haben")
  2. Zusammenfassen was du verstanden hast und um Bestätigung bitten.
  3. Konkreten nächsten Schritt anbieten — am besten einen, der weniger Fragen erfordert.
  4. Nur wenn Frustration anhält: Transfer zu einem Mitarbeiter anbieten.

  ### Fehlerbehandlung — PFLICHT
  NIEMALS zum Anrufer sagen:
  - "technisches Problem" / "technischer Fehler" / "System-Fehler"
  - "ich habe einen Fehler" / "etwas ist schiefgelaufen"
  - "konnte nicht automatisch bestätigt werden"
  - "Entschuldigung, das hat nicht funktioniert"
  Wenn ein internes Problem auftritt, sage stattdessen genau:
  "Einen Moment bitte, ich verbinde Sie mit einem Kollegen."
  und rufe [TOOL:transfer_to_human] auf.

  ### Guardrails (Server-seitig durchgesetzt)
  - Name ist PFLICHT für Bestellungen (Server blockiert ohne update_state)
  - Lieferadresse MUSS verifiziert sein (verify_address erforderlich vor create_order)
  - Keine doppelten Aufrufe im gleichen Gespräch ohne Grund
  - Kein Auflegen ohne end_call()

  ### Small-Talk & Chit-Chat
  Bei Small-Talk kurz und herzlich eingehen (1-2 Sätze), gerne einen kleinen Witz oder freundliche Bemerkung, dann locker zurücklenken.
  Beispiele:
  - "Wie geht's?" → "Super, danke — bereit für die beste Bestellung des Tages! Was darf ich für Sie tun?"
  - "Schönes Wetter heute" → "Ja! Perfektes Wetter für ein Bibimbap auf der Terrasse. Darf ich eine Bestellung aufnehmen?"
  - "Was machst du so?" → "Ich begeistere Leute für koreanisches Soulfood — bester Job der Welt! Womit kann ich helfen?"
  NIEMALS "Dazu kann ich leider nichts sagen" bei Small-Talk. Immer mit Humor reagieren, dann zurücklenken.
  Nur bei wirklich unpassenden Themen (Beleidigungen, Politik-Debatten) sachlich: "Da bin ich leider nicht die Richtige — beim Essen helfe ich gerne!"

  ### Out-of-Scope
  - Catering 50+, Events, Presse, Rechtsfragen → transfer_to_human()
  - Nicht-DOBOO-Anfragen → "Ich bin Sailly von DOBOO — da kann ich leider nicht helfen"
  - Technische Fragen → "Das gebe ich gerne weiter"

voice: Kore
model: gemini-2.5-flash

# Audio pipeline configuration
audio:
  stt_model: "flux-general-multi"  # Deepgram Flux model for German
  stt_endpoint: "wss://api.eu.deepgram.com"  # EU data-residency endpoint (SDK appends /v1/listen)
  stt_endpointing_ms: 700       # Silence timeout for end-of-turn detection — aligned with code (700ms)
  smart_format: true            # Format digits/phone numbers (e.g. "0179 345 67 89")
  eot_threshold: 0.7            # Flux confidence threshold for EOT (0.5-0.9, higher = more conservative)
  eager_eot_threshold: 0.5      # Flux early EOT signal for LLM pre-processing during caller speech

# Tools enabled for this tenant
tools:
  - name: check_availability
    description: Prüft Tischverfügbarkeit UND Bestellstatus/Wartezeiten. Für Reservierungen Datum, Uhrzeit, Personenanzahl übergeben. Für Bestellstatus/Wartezeit-Fragen ohne Datum/Uhrzeit aufrufen.
    parameters:
      type: object
      properties:
        date:
          type: string
          description: Datum im Format YYYY-MM-DD (optional für Wartezeit-Fragen)
        time:
          type: string
          description: Uhrzeit im Format HH:MM (optional für Wartezeit-Fragen)
        party_size:
          type: integer
          description: Anzahl der Personen
      required: ["party_size"]
  
  - name: create_reservation
    description: Erstelle eine bestätigte Reservierung. Erst aufrufen wenn alle Pflichtfelder bestätigt sind.
    parameters:
      type: object
      properties:
        date:
          type: string
          description: Datum im Format YYYY-MM-DD
        time:
          type: string
          description: Uhrzeit im Format HH:MM
        party_size:
          type: integer
          description: Anzahl der Personen
        name:
          type: string
          description: Name des Gastes
        phone:
          type: string
          description: Telefonnummer des Gastes
        email:
          type: string
          description: E-Mail-Adresse (optional)
        notes:
          type: string
          description: Besondere Wünsche (optional)
      required: ["date", "time", "party_size", "name"]
  
  - name: get_restaurant_info
    description: Hole Informationen über das Restaurant (Öffnungszeiten, Menü, Lage, Parken etc.). Nie aus dem Gedächtnis.
    parameters:
      type: object
      properties:
        query:
          type: string
          description: Welche Information wird benötigt
      required: ["query"]
  
  - name: get_menu
    description: Hole die Speisekarte oder eine bestimmte Kategorie. Bei Menü-Fragen, Empfehlungen, Preisen oder Allergenen.
    parameters:
      type: object
      properties:
        category:
          type: string
          description: Kategorie vorspeisen, hauptgerichte, sushi, desserts, beilagen, alle
      required: []
  
  - name: update_state
    description: Speichere neue Informationen vom Anrufer (Name, Datum, Uhrzeit, Personenzahl, Anlass, Sonderwünsche). JEDES MAL aufrufen wenn der Anrufer neue Details nennt.
    parameters:
      type: object
      properties:
        caller_name:
          type: string
          description: Name des Anrufers
        party_size:
          type: integer
          description: Anzahl der Personen
        reservation_date:
          type: string
          description: Datum im Format YYYY-MM-DD
        reservation_time:
          type: string
          description: Uhrzeit im Format HH:MM
        occasion:
          type: string
          description: Anlass romantic, birthday, business, wedding
        special_requests:
          type: string
          description: Besondere Wünsche oder Bestelldetails
        table_preference:
          type: string
          description: Tischpräferenz window, quiet, none
      required: []
  
  - name: create_order
    description: Erstelle eine Takeaway/Delivery-Bestellung. ERST aufrufen wenn ALLE Pflichtfelder gesammelt und bestaetigt sind (Name, Gerichte, Bestellart, Zahlungsart, bei Delivery auch Lieferadresse). NIEMALS ohne Name oder ohne Lieferadresse bei Delivery aufrufen!
    parameters:
      type: object
      properties:
        name:
          type: string
          description: Name des Bestellers
        phone:
          type: string
          description: Telefonnummer (E.164)
        messaging_phone:
          type: string
          description: Nummer für SMS/WhatsApp-Bestätigung (E.164)
        channel:
          type: string
          description: Wird automatisch erkannt (nicht manuell setzen)
        order_items:
          type: string
          description: Bestellte Gerichte mit Mengen (z.B. Bibimbap x2, Bulgogi x1)
        order_type:
          type: string
          description: takeaway oder delivery
        payment_method:
          type: string
          description: cash, card oder online
        total_price:
          type: number
          description: Gesamtpreis in EUR
        delivery_address:
          type: string
          description: "Lieferadresse — PFLICHT bei delivery! IMMER mit der verifizierten Adresse aus verify_address befüllen. Niemals create_order(order_type=delivery) ohne dieses Feld aufrufen!"
        special_requests:
          type: string
          description: Besondere Wünsche (optional)
        estimated_minutes:
          type: number
          description: Geschätzte Zeit in Minuten
      required: ["name", "order_items", "order_type", "payment_method", "total_price"]
  
  - name: verify_address
    description: Validiert eine Lieferadresse mit Google Geocoding. PFLICHT vor create_order(order_type=delivery). Bei ungültiger Adresse freundlich um Korrektur bitten.
    parameters:
      type: object
      properties:
        address:
          type: string
          description: Straße und Hausnummer der Lieferadresse
        city:
          type: string
          description: Stadt (optional, Standard Bonn)
        country:
          type: string
          description: Land (optional, Standard Deutschland)
      required: ["address"]

  - name: get_date_info
    description: Gibt den Wochentag und relative Info für ein Datum zurück. IMMER aufrufen bei Wochentag-Fragen.
    parameters:
      type: object
      properties:
        date:
          type: string
          description: Datum im Format YYYY-MM-DD oder deutsch (15. April 2026)
      required: ["date"]

  - name: get_weather
    description: Aktuelles Wetter am Restaurantstandort Bonn. Aufrufen bei Fragen zu Außenbereich, Terrasse, Wetter heute oder ob man einen Regenschirm braucht.
    parameters:
      type: object
      properties:
        location:
          type: string
          description: Ort (optional, Standard DOBOO Bonn)
      required: []

  - name: get_nearby_parking
    description: Findet Parkmöglichkeiten in der Nähe des Restaurants. Aufrufen bei Fragen zum Parken, Parkhaus oder Stellplätzen in der Nähe.
    parameters:
      type: object
      properties:
        radius_meters:
          type: integer
          description: Suchradius in Metern (optional, Standard 500m)
      required: []

  - name: get_directions
    description: Wegbeschreibung zum Restaurant. Aufrufen bei Fragen wie "Wie komme ich zu euch?", Anfahrt, Route oder Entfernung.
    parameters:
      type: object
      properties:
        origin:
          type: string
          description: Startadresse oder Ort des Anrufers (optional)
        mode:
          type: string
          description: Fortbewegungsmittel — DRIVE, WALK oder TRANSIT (optional, Standard DRIVE)
      required: []

  - name: transfer_to_human
    description: Leitet den Anruf an einen Mitarbeiter weiter. Aufrufen wenn (1) Gast nach Mensch fragt, (2) Problem 3x ungelöst, (3) Frustration, (4) >8 Min ohne Abschluss.
    parameters:
      type: object
      properties:
        reason:
          type: string
          description: caller_requested | loop_detected | frustration | timeout
        conversation_id:
          type: string
          description: Aktuelle conversation_id
        call_sid:
          type: string
          description: Twilio Call SID
      required: ["reason"]

# Business information
  - name: end_call
    description: Beende das Gespraech und lege auf. PFLICHT nach Verabschiedung. Verhindert laufende Kosten bei vergessenen Anrufen.
    parameters:
      type: object
      properties:
        reason:
          type: string
          description: "Grund: goodbye (normal), timeout (keine Antwort), completed (Auftrag erledigt)"
      required: ["reason"]

