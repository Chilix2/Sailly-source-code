id: restaurant
name: Restaurant
description: Maxed-out restaurant voice-agent template based on DOBOO Korean Soulfood.
version: "1.1"
language_defaults:
  - de
  - en
compliance_checklist:
  - KI disclosure is spoken in the first audible greeting.
  - Human fallback is available for complaints, payment issues, and complex requests.
  - Order and reservation commits require readback confirmation.
  - Phone number and address are optional unless the selected fulfillment path requires them.
capabilities:
  - id: greeting_language
    name: Greeting and language selection
    category: conversation
    description: Open the call, disclose AI usage, detect language, and establish caller intent.
    tools: []
    slots:
      - language
      - caller_intent
    variables:
      - restaurant_name
      - greeting_line
      - language_defaults
    guards:
      - id: ki_disclosure_first_turn
        description: First audible greeting must identify the assistant as AI-supported.
        applies_to: [greeting]
      - id: no_tool_leakage
        description: Never expose tool calls, JSON, or internal state to callers.
        forbidden_behaviors:
          - Say [tool:
          - Mention validation status.
    prompt_fragments:
      - Always greet warmly and disclose the assistant is AI-supported.
      - Keep the first turn short and invite the caller to state their goal.
    scenarios:
      - id: restaurant_greeting_basic
        name: Basic German greeting
        caller_goal: The caller says hello and waits for help.
        expected:
          final_state: greeting
          transcript_assertions:
            - KI
            - wie kann ich
          guards:
            - ki_disclosure_first_turn
            - no_tool_leakage
  - id: business_info
    name: Opening hours, address, parking, and directions
    category: knowledge
    description: Answer operational questions using tenant configuration and FAQ data.
    tools:
      - name: faq
        required: false
        description: Ground answers in tenant FAQ and practice data.
      - name: get_date_info
        required: false
        description: Resolve date-sensitive opening-hour answers.
    slots:
      - topic
    variables:
      - opening_hours
      - address
      - parking
      - cuisine_type
    guards:
      - id: knowledge_grounding
        description: Operational facts must come from tenant config, FAQ, or date-aware helpers.
        applies_to: [faq, get_date_info]
        forbidden_behaviors:
          - Invent opening hours.
          - Invent parking or address details.
    scenarios:
      - id: restaurant_hours_today
        name: Opening hours today
        caller_goal: The caller asks whether the restaurant is open today.
        expected:
          tools:
            - faq
          transcript_assertions:
            - geöffnet
          guards:
            - knowledge_grounding
  - id: menu_browsing
    name: Menu browsing and recommendations
    category: knowledge
    description: Explain the menu, recommend dishes, and answer price questions.
    tools:
      - name: get_menu
        required: false
        description: Retrieve menu items, categories, prices, and descriptions.
    slots:
      - menu_topic
      - dietary_preference
    variables:
      - menu_version
      - menu.categories
      - cuisine_type
    guards:
      - id: menu_grounding
        description: Menu recommendations, prices, and availability must be grounded in get_menu or tenant menu data.
        applies_to: [get_menu]
        forbidden_behaviors:
          - Hallucinate dishes not present in the menu.
          - Deny an item that is present in the menu.
    scenarios:
      - id: restaurant_menu_recommendation
        name: Recommendation request
        caller_goal: The caller asks what Korean dish you recommend.
        expected:
          tools:
            - get_menu
          transcript_assertions:
            - empfehle
          guards:
            - menu_grounding
  - id: dietary_allergens
    name: Dietary and allergen questions
    category: knowledge
    description: Answer vegan, vegetarian, spice-level, and allergen questions conservatively.
    tools:
      - name: get_menu
        required: false
    slots:
      - allergy
      - dietary_preference
    variables:
      - menu.categories.items.allergens
      - allergen_disclaimer
    guards:
      - id: allergen_safety
        description: Allergen answers must be conservative and avoid guarantees without authoritative allergen data.
        applies_to: [get_menu]
        forbidden_behaviors:
          - Guarantee allergen-free food without a configured allergen source.
    scenarios:
      - id: restaurant_allergy_warning
        name: Allergy warning
        caller_goal: The caller asks whether dishes contain peanuts.
        expected:
          forbidden_behaviors:
            - Guarantee allergen-free food without a configured allergen source.
          guards:
            - allergen_safety
  - id: takeaway_order
    name: Takeaway order creation
    category: transaction
    description: Collect order items, customer name, read back priced summary, and create an order.
    tools:
      - name: create_order
        required: true
        required_slots:
          - order_items
          - customer_name
        optional_slots:
          - phone_number
    slots:
      - order_items
      - customer_name
      - phone_number
    variables:
      - pre_order.kitchen_prep_minutes
      - pickup_policy
      - payment_options
    guards:
      - id: order_readback_before_commit
        description: Repeat items, fulfillment, price if known, name, and pickup timing before create_order.
        applies_to: [create_order]
      - id: order_required_slots
        description: Do not create takeaway orders before required order items and customer name are collected.
        applies_to: [create_order]
    scenarios:
      - id: restaurant_takeaway_order
        name: Simple takeaway order
        caller_goal: The caller orders Bibimbap for pickup under the name Müller.
        required_data:
          customer_name: Müller
          order_items:
            - Bibimbap
        expected:
          tools:
            - create_order
          final_state: confirmed
          guards:
            - order_readback_before_commit
            - order_required_slots
  - id: delivery_order
    name: Delivery order creation
    category: transaction
    description: Collect items, name, optional phone/address, and create delivery order if enabled.
    tools:
      - name: create_order
        required: true
        required_slots:
          - order_items
          - customer_name
        optional_slots:
          - phone_number
          - delivery_address
      - name: verify_address
        required: false
    slots:
      - order_items
      - customer_name
      - phone_number
      - delivery_address
    variables:
      - delivery_radius
      - delivery_fee
      - address_validation_policy
    guards:
      - id: delivery_address_verified
        description: Delivery orders require address collection and validation before create_order when verification is configured.
        applies_to: [verify_address, create_order]
      - id: delivery_order_readback_before_commit
        description: Repeat items, address, contact data, and delivery timing before create_order.
        applies_to: [create_order]
    scenarios:
      - id: restaurant_delivery_order
        name: Delivery order with address
        caller_goal: The caller orders food for delivery and gives an address.
        expected:
          tools:
            - create_order
          guards:
            - delivery_address_verified
            - delivery_order_readback_before_commit
  - id: order_management
    name: Order modification, cancellation, and status
    category: transaction
    description: Handle post-order changes, status requests, and cancellations.
    tools:
      - name: modify_order
        required: false
      - name: cancel_order
        required: false
      - name: order_status
        required: false
    slots:
      - order_reference
      - customer_name
      - requested_change
    variables:
      - order_lookup_policy
      - cancellation_policy
    guards:
      - id: identify_order_before_change
        description: Order changes, cancellations, and status lookups require an order reference or enough caller/order identity.
        applies_to: [modify_order, cancel_order, order_status]
    scenarios:
      - id: restaurant_order_status
        name: Order status request
        caller_goal: The caller asks where their order is.
        expected:
          tools:
            - order_status
          guards:
            - identify_order_before_change
  - id: reservation_create
    name: Reservation creation
    category: transaction
    description: Collect party size, date, time, and name; confirm by readback before commit.
    tools:
      - name: create_reservation
        required: true
        required_slots:
          - party_size
          - reservation_date
          - reservation_time
          - customer_name
        optional_slots:
          - phone_number
    slots:
      - party_size
      - reservation_date
      - reservation_time
      - customer_name
      - phone_number
    variables:
      - reservation_capacity
      - opening_hours
      - seating_policy
    guards:
      - id: reservation_readback_before_commit
        description: Repeat party size, date, time, name, and contact details before create_reservation.
        applies_to: [create_reservation]
      - id: reservation_required_slots
        description: Do not create reservations before party size, date, time, and name are collected.
        applies_to: [create_reservation]
    scenarios:
      - id: restaurant_reservation_create
        name: Table reservation
        caller_goal: The caller reserves a table for two tomorrow at 19:00.
        expected:
          tools:
            - create_reservation
          final_state: confirmed
          guards:
            - reservation_readback_before_commit
            - reservation_required_slots
  - id: reservation_management
    name: Reservation modification and cancellation
    category: transaction
    description: Modify or cancel existing reservations after identifying caller and booking.
    tools:
      - name: modify_reservation
        required: false
      - name: cancel_reservation
        required: false
    slots:
      - reservation_reference
      - customer_name
      - requested_change
    variables:
      - reservation_lookup_policy
      - cancellation_policy
    guards:
      - id: identify_reservation_before_change
        description: Reservation changes and cancellations require a reservation reference or enough caller/reservation identity.
        applies_to: [modify_reservation, cancel_reservation]
    scenarios:
      - id: restaurant_cancel_reservation
        name: Cancel reservation
        caller_goal: The caller wants to cancel a reservation.
        expected:
          tools:
            - cancel_reservation
          guards:
            - identify_reservation_before_change
  - id: group_catering
    name: Large group and catering lead capture
    category: lead
    description: Capture larger event/catering requests and route to staff.
    tools:
      - name: capture_catering_lead
        required: false
      - name: transfer_to_human
        required: false
    slots:
      - party_size
      - date
      - customer_name
      - phone_number
      - notes
    variables:
      - catering_minimum_notice
      - catering_capacity
      - event_lead_sla
    guards:
      - id: catering_lead_not_commit
        description: Large group and catering requests are leads unless configured for direct booking.
        applies_to: [capture_catering_lead, transfer_to_human]
        forbidden_behaviors:
          - Promise catering availability without staff review.
    scenarios:
      - id: restaurant_catering_lead
        name: Catering lead
        caller_goal: The caller asks for catering for a large group.
        expected:
          tools:
            - capture_catering_lead
          guards:
            - catering_lead_not_commit
  - id: escalation
    name: Complaint, payment issue, lost-and-found, and human handoff
    category: escalation
    description: Capture sensitive cases, avoid over-promising, and hand off to a human.
    tools:
      - name: transfer_to_human
        required: false
    slots:
      - issue_type
      - customer_name
      - phone_number
      - notes
    variables:
      - handoff_phone
      - escalation_hours
      - complaint_sla
    guards:
      - id: sensitive_topic_handoff
        description: Complaints, payment issues, refund requests, abuse, and out-of-scope topics require human handoff.
        applies_to: [transfer_to_human]
    scenarios:
      - id: restaurant_complaint_escalation
        name: Complaint escalation
        caller_goal: The caller complains that an order was wrong.
        expected:
          tools:
            - transfer_to_human
          forbidden_behaviors:
            - Refuse to escalate.
          guards:
            - sensitive_topic_handoff
  - id: goodbye_close
    name: Goodbye and call close
    category: conversation
    description: End calls politely, summarize completed actions, and emit end_call.
    tools:
      - name: end_call
        required: false
    slots: []
    variables:
      - farewell_text
      - completion_summary_policy
    guards:
      - id: polite_close
        description: End calls politely after summarizing any completed action and call end_call when available.
        applies_to: [end_call]
    scenarios:
      - id: restaurant_goodbye
        name: Polite goodbye
        caller_goal: The caller says goodbye after getting an answer.
        expected:
          tools:
            - end_call
          guards:
            - polite_close
