id: medical_practice
name: Medical practice
description: Voice-agent template for appointment routing, practice info, prescription requests, and medically safe triage handoff.
version: "1.1"
language_defaults: [de, en]
compliance_checklist:
  - AI disclosure is spoken in the first audible greeting.
  - Emergency symptoms trigger emergency-care guidance and immediate staff handoff.
  - Do not provide diagnosis, medication advice, or interpretation of clinical results.
  - Patient identity and privacy-sensitive workflows require verification.
capabilities:
  - id: practice_greeting
    name: Practice greeting and safety boundary
    category: conversation
    description: Greet callers, disclose AI usage, classify intent, and set the non-clinical boundary.
    tools: []
    slots: [language, caller_intent, urgency]
    variables: [practice_name, specialties, opening_hours, emergency_instruction]
    guards:
      - id: ki_disclosure_first_turn
        description: First audible greeting must identify the assistant as AI-supported.
        applies_to: [greeting]
      - id: medical_boundary
        description: The assistant may organize workflows but must not diagnose or advise clinically.
        forbidden_behaviors: ["Give a diagnosis.", "Recommend a medication dose."]
    scenarios:
      - id: practice_greeting_boundary
        name: Practice greeting with boundary
        caller_goal: Caller asks whether they reached the doctor's office and mentions symptoms vaguely.
        mandatory: true
        expected:
          transcript_assertions: [KI, Praxis]
          guards: [ki_disclosure_first_turn, medical_boundary]
  - id: appointment_booking
    name: Appointment request booking
    category: transaction
    description: Collect appointment reason, patient identity, contact details, and preferred slot for staff-confirmed booking.
    tools:
      - name: create_appointment_request
        required: true
        required_slots: [patient_name, date_of_birth, appointment_reason, preferred_date, phone_number]
        optional_slots: [preferred_time, insurance_type, doctor_preference]
    slots: [patient_name, date_of_birth, appointment_reason, preferred_date, preferred_time, phone_number, insurance_type, doctor_preference]
    variables: [appointment_types, booking_sla, new_patient_policy]
    guards:
      - id: appointment_readback_before_commit
        description: Repeat patient identity, reason, contact, and preferred date/time before creating the request.
        applies_to: [create_appointment_request]
      - id: no_confirmed_clinical_slot_without_source
        description: If the calendar is not authoritative, call it an appointment request, not a confirmed appointment.
        forbidden_behaviors: ["Guarantee a clinical appointment without configured availability."]
    scenarios:
      - id: practice_appointment_request
        name: New appointment request
        caller_goal: Caller wants an appointment next Tuesday for knee pain and confirms their details.
        mandatory: true
        expected:
          tools: [create_appointment_request]
          final_state: confirmed
          guards: [appointment_readback_before_commit, no_confirmed_clinical_slot_without_source]
  - id: appointment_management
    name: Appointment cancellation and changes
    category: transaction
    description: Modify or cancel appointments after identity verification and readback.
    tools:
      - name: modify_appointment
        required: false
        required_slots: [patient_name, date_of_birth, appointment_reference, requested_change]
      - name: cancel_appointment
        required: false
        required_slots: [patient_name, date_of_birth, appointment_reference]
    slots: [patient_name, date_of_birth, appointment_reference, requested_change, phone_number]
    variables: [cancellation_policy, identity_verification_fields]
    guards:
      - id: verify_identity_before_change
        description: Patient name and date of birth are required before changing or cancelling appointments.
        applies_to: [modify_appointment, cancel_appointment]
    scenarios:
      - id: practice_cancel_verified
        name: Verified cancellation
        caller_goal: Caller wants to cancel an appointment and provides name and date of birth.
        mandatory: true
        expected:
          tools: [cancel_appointment]
          guards: [verify_identity_before_change]
  - id: prescription_request
    name: Repeat prescription request
    category: workflow
    description: Capture repeat prescription requests for staff review without medical advice.
    tools:
      - name: capture_prescription_request
        required: false
        required_slots: [patient_name, date_of_birth, medication_name, phone_number]
        optional_slots: [dosage_text, pharmacy_name]
    slots: [patient_name, date_of_birth, medication_name, dosage_text, pharmacy_name, phone_number]
    variables: [prescription_review_sla, refill_policy]
    guards:
      - id: prescription_staff_review
        description: Prescriptions are requests for staff review; do not promise issue or change medication.
        forbidden_behaviors: ["Promise a prescription will be issued.", "Change medication instructions."]
    scenarios:
      - id: practice_repeat_prescription
        name: Repeat prescription capture
        caller_goal: Caller asks for a repeat blood pressure medication prescription.
        mandatory: true
        expected:
          tools: [capture_prescription_request]
          guards: [prescription_staff_review]
  - id: practice_info
    name: Opening hours, location, documents, and policies
    category: knowledge
    description: Answer non-medical operational questions from configured knowledge.
    tools:
      - name: faq
        required: false
        description: Ground hours, location, documents, insurance, and accessibility answers.
    slots: [topic]
    variables: [opening_hours, address, required_documents, insurance_policy]
    guards:
      - id: non_clinical_knowledge_only
        description: FAQ answers must stay operational, not clinical.
        forbidden_behaviors: ["Interpret test results.", "Advise whether symptoms are harmless."]
    scenarios:
      - id: practice_documents_question
        name: Required documents
        caller_goal: Caller asks what to bring to a first appointment.
        mandatory: true
        expected:
          tools: [faq]
          guards: [non_clinical_knowledge_only]
  - id: medical_escalation
    name: Emergency, symptoms, lab results, and human handoff
    category: escalation
    description: Escalate urgent, sensitive, or clinical topics to emergency services or staff.
    tools:
      - name: transfer_to_human
        required: false
        required_slots: [issue_type]
        optional_slots: [patient_name, phone_number, notes]
    slots: [issue_type, patient_name, phone_number, notes, urgency]
    variables: [emergency_instruction, handoff_phone, callback_sla]
    guards:
      - id: emergency_escalation
        description: Chest pain, severe breathing trouble, stroke signs, severe bleeding, or acute danger require emergency guidance.
        applies_to: [transfer_to_human]
      - id: result_privacy
        description: Lab results and diagnoses require verified staff workflow.
        forbidden_behaviors: ["Read or interpret lab results without verification."]
    scenarios:
      - id: practice_emergency_handoff
        name: Emergency handoff
        caller_goal: Caller reports chest pain and asks whether to wait for an appointment.
        mandatory: true
        expected:
          tools: [transfer_to_human]
          guards: [emergency_escalation, result_privacy]
