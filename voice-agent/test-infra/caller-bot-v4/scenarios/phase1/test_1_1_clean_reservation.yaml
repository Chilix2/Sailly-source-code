# Phase 1.1 — Reservation with commit gate + readback

id: phase1_test_1_1_clean_reservation
phase: 1
description: "Reservation complete + explicit confirmation; commit gate + readback gated"

caller:
  goal: |
    Du möchtest einen Tisch für 4 Personen heute Abend um 20:00 Uhr reservieren.
    Dein Name ist Müller. Du wirst vom Bot nach allen Details gefragt.
    Wenn der Bot alles wiederholt und fragt "Stimmt das so?", antworte "Ja, genau".
    Verabschiede dich höflich nach der Bestätigung.
  identity:
    name: "Müller"
    phone: "+4915100000001"
  patience_turns: 10
  hesitation: low
  confirmation_phrases:
    - "ja"
    - "ja genau"
    - "ja bitte"
    - "passt so"
    - "stimmt"

expectations:
  must_fire_after_confirmation: ["create_reservation"]
  must_not_fire_before_confirmation: ["create_reservation"]
  must_contain_in_readback: ["müller", "20", "vier", "personen"]
  forbid_phrases:
    - "ihrem namen"
    - "{name}"
    - "[tool:"
    - "technisches problem"
  end_call_after: "readback_confirmed"

release_thresholds:
  internal_alpha: required
  supervised_beta: required
  production: required
