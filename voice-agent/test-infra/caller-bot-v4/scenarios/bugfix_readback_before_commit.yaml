# Bug Fix 3: Prevent hallucinated confirmation without create_reservation firing
# Caller provides all slots → system must do readback → wait for confirmation
# Expectation: create_reservation tool is only called AFTER caller confirms readback

id: bugfix_readback_before_commit
phase: bugfix
description: "Readback happens before reservation commit, preventing hallucinated confirmations"

caller:
  goal: "Gebe alle Reservierungsdaten auf einmal und bestätige die Zusammenfassung."
  utterance_sequence:
    - "Ich möchte für Dienstag um 19 Uhr einen Tisch für drei Personen auf den Namen Thomas Bauer reservieren. Die Nummer ist 0228 9123456."
    - "ja, das stimmt"  # Caller confirms readback
  identity:
    name: "Thomas Bauer"
    phone: "+4915900000000"
  patience_turns: 10
  hesitation: low

expectations:
  # Must include readback (listing date, time, party size, name, phone)
  must_contain_one_of:
    - "bestätigung"
    - "zusammenfassung"
    - "wiederholen"
    - "stimmt das"
  # Must not skip to "confirmation successful" without asking for confirmation
  must_not_contain:
    - "bestätigt"
    - "reservierung gemacht"
    - "erfolgreich"
  # After confirmation, should acknowledge completion
  after_confirmation_must_contain:
    - "reservierung"
    - "dank"
    - "wiederhören"

release_thresholds:
  internal_alpha: required
  supervised_beta: required
  production: required
