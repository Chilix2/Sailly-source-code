      - GLADIA_API_KEY
    models:
      - id: realtime
        label: Realtime
        latency_class: realtime
        streaming: true
        voice_agent_ready: true
        recommended: false
  - id: speechmatics
    label: Speechmatics
    configured_by:
      - SPEECHMATICS_API_KEY
    models:
      - id: realtime
        label: Realtime
        latency_class: realtime
        streaming: true
