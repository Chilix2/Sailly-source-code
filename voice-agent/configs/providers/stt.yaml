kind: stt
providers:
  - id: deepgram
    label: Deepgram
    configured_by:
      - DEEPGRAM_API_KEY
    models:
      - id: flux-general-multi
        label: Flux General Multi
        latency_class: realtime
        streaming: true
        voice_agent_ready: true
        recommended: true
        notes: EU endpoint, semantic end-of-turn, eager EOT support.
      - id: nova-3
        label: Nova-3
        latency_class: realtime
        streaming: true
        voice_agent_ready: true
        recommended: false
        notes: Legacy Deepgram STT path.
  - id: openai
    label: OpenAI
    configured_by:
      - OPENAI_API_KEY
    models:
      - id: whisper-1
        label: Whisper
        latency_class: batch
        streaming: false
        voice_agent_ready: false
        recommended: false
        notes: Useful for offline transcription, not preferred for live calls.
  - id: groq
    label: Groq
    configured_by:
      - GROQ_API_KEY
    models:
      - id: whisper-large-v3-turbo
        label: Whisper Large v3 Turbo
        latency_class: fast
        streaming: false
        voice_agent_ready: false
        recommended: false
        notes: Fast transcription option for non-streaming test flows.
  - id: google
    label: Google Speech-to-Text
    configured_by:
