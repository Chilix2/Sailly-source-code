id: construction_trades
name: Construction and trades
description: Voice-agent template for construction firms, contractors, trades, field-service teams, and emergency repair intake.
version: "1.0"
language_defaults: [de, en]
compliance_checklist:
  - AI disclosure is spoken in the first audible greeting.
  - Emergency or safety-critical cases are escalated immediately.
  - Site visits, quotes, and work orders require contact, location, scope, and readback.
  - Do not promise final pricing, code compliance, or insurance coverage without staff review.
capabilities:
  - id: trades_greeting
    name: Business greeting and service routing
    category: conversation
    description: Greet callers, disclose AI usage, and route to emergency repair, estimate, project, scheduling, billing, or staff.
    tools: []
    slots: [language, caller_intent, service_type, urgency]
    variables: [business_name, service_area, opening_hours, emergency_hours]
    guards:
      - id: ki_disclosure_first_turn
        description: First audible greeting must identify the assistant as AI-supported.
        applies_to: [greeting]
      - id: emergency_detection
        description: Fire, gas smell, active flooding, electrical hazards, structural danger, and lock-in cases require urgent handoff guidance.
        applies_to: [transfer_to_human]
    scenarios:
      - id: trades_greeting_emergency_route
        name: Emergency route
        caller_goal: Caller says water is coming through the ceiling and needs help.
        mandatory: true
        expected:
          transcript_assertions: [KI]
          guards: [ki_disclosure_first_turn, emergency_detection]
  - id: estimate_request
    name: Estimate and quote request
    category: lead
    description: Capture project scope, address, photos/documents availability, timeline, and contact details for staff follow-up.
    tools:
      - name: capture_estimate_request
        required: false
        required_slots: [customer_name, phone_number, service_address, project_scope]
        optional_slots: [preferred_date, budget, photos_available]
    slots: [customer_name, phone_number, email, service_address, project_scope, preferred_date, budget, photos_available]
    variables: [estimate_sla, service_area, photo_upload_policy]
    guards:
      - id: no_final_quote_promise
        description: Estimates are intake requests; final quote requires staff or site review.
        forbidden_behaviors: ["Give a binding final price.", "Promise insurance coverage."]
      - id: estimate_readback_before_commit
        description: Repeat scope, address, timeline, and contact data before lead creation.
        applies_to: [capture_estimate_request]
    scenarios:
      - id: trades_estimate_roof
        name: Roof estimate intake
        caller_goal: Caller wants an estimate for a leaking roof and provides address and phone number.
        mandatory: true
        expected:
          tools: [capture_estimate_request]
          guards: [no_final_quote_promise, estimate_readback_before_commit]
  - id: job_scheduling
    name: Site visit or service appointment
    category: transaction
    description: Schedule site visits, maintenance, inspections, and non-emergency repairs after readback.
    tools:
      - name: create_service_appointment
        required: true
        required_slots: [customer_name, phone_number, service_address, service_reason, appointment_date]
        optional_slots: [appointment_time, access_notes]
    slots: [customer_name, phone_number, service_address, service_reason, appointment_date, appointment_time, access_notes]
    variables: [calendar_source, technician_regions, access_requirements]
    guards:
      - id: appointment_readback_before_commit
        description: Confirm service reason, address, date/time, and contact details before scheduling.
        applies_to: [create_service_appointment]
      - id: service_area_check
        description: Jobs outside configured service area should be captured for callback, not scheduled as confirmed.
        forbidden_behaviors: ["Confirm service outside service area without review."]
    scenarios:
      - id: trades_site_visit_booking
        name: Site visit booking
        caller_goal: Caller wants a plumber visit next week for a bathroom renovation.
        mandatory: true
        expected:
          tools: [create_service_appointment]
          final_state: confirmed
          guards: [appointment_readback_before_commit, service_area_check]
  - id: emergency_repair
    name: Emergency repair intake and handoff
    category: escalation
    description: Triage urgent repair calls, collect safe contact/location details, and hand off to emergency staff.
    tools:
      - name: transfer_to_human
        required: false
        required_slots: [issue_type]
        optional_slots: [customer_name, phone_number, service_address, notes]
      - name: create_emergency_ticket
        required: false
        required_slots: [issue_type, phone_number, service_address]
    slots: [issue_type, customer_name, phone_number, service_address, safety_risk, notes]
    variables: [emergency_phone, emergency_hours, safety_script]
    guards:
      - id: safety_first
        description: For immediate hazards, tell caller to prioritize safety and contact emergency services where appropriate.
        applies_to: [transfer_to_human, create_emergency_ticket]
      - id: no_remote_safety_clearance
        description: Do not declare a site safe remotely.
        forbidden_behaviors: ["Say an electrical or gas situation is safe."]
    scenarios:
      - id: trades_electrical_hazard
        name: Electrical hazard handoff
        caller_goal: Caller reports sparks from an outlet.
        mandatory: true
        expected:
          tools: [transfer_to_human]
          guards: [safety_first, no_remote_safety_clearance]
  - id: project_status
    name: Project status and crew callback
    category: workflow
    description: Capture existing customer project status questions and route to the assigned crew or office.
    tools:
      - name: lookup_project
        required: false
        required_slots: [project_reference]
      - name: create_callback
        required: false
        required_slots: [customer_name, phone_number, reason]
    slots: [project_reference, customer_name, phone_number, service_address, reason]
    variables: [project_system, callback_sla, crew_contact_policy]
    guards:
      - id: verify_before_project_details
        description: Verify project reference or customer/address before discussing project details.
        applies_to: [lookup_project, create_callback]
    scenarios:
      - id: trades_project_status
        name: Project status callback
        caller_goal: Caller asks when the crew will return to finish a kitchen job.
        mandatory: true
        expected:
          tools: [create_callback]
          guards: [verify_before_project_details]
  - id: trades_escalation
    name: Complaint, billing, legal, and human handoff
    category: escalation
    description: Route disputes, billing issues, contract questions, safety complaints, and legal matters to staff.
    tools:
      - name: transfer_to_human
        required: false
        required_slots: [issue_type]
        optional_slots: [customer_name, phone_number, notes]
    slots: [issue_type, customer_name, phone_number, project_reference, notes]
    variables: [handoff_phone, escalation_hours, complaint_sla]
    guards:
      - id: sensitive_topic_handoff
        description: Billing disputes, legal claims, contract changes, safety complaints, and angry complaints require staff.
        applies_to: [transfer_to_human]
    scenarios:
      - id: trades_billing_dispute
        name: Billing dispute handoff
        caller_goal: Caller disputes an invoice and threatens legal action.
        mandatory: true
        expected:
          tools: [transfer_to_human]
          guards: [sensitive_topic_handoff]
