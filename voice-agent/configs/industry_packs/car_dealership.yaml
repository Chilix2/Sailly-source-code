id: car_dealership
name: Car dealership
description: Voice-agent template for sales reception, inventory, service appointments, trade-in intake, and dealership-safe handoff.
version: "1.1"
language_defaults: [de, en]
compliance_checklist:
  - AI disclosure is spoken in the first audible greeting.
  - Do not make binding financing, availability, warranty, or trade-in value promises.
  - Appointment and lead commits require readback confirmation.
  - Escalate legal, warranty dispute, accident, payment, and complaint cases to staff.
capabilities:
  - id: dealership_greeting
    name: Reception greeting and routing
    category: conversation
    description: Greet callers, disclose AI usage, and route between sales, service, parts, billing, and staff.
    tools: []
    slots: [language, caller_intent, department]
    variables: [dealer_name, city, opening_hours, departments]
    guards:
      - id: ki_disclosure_first_turn
        description: First audible greeting must identify the assistant as AI-supported.
        applies_to: [greeting]
      - id: no_tool_leakage
        description: Never expose tool names, JSON, or internal state to callers.
        forbidden_behaviors: ["Say [tool:", "Mention internal routing state."]
    scenarios:
      - id: dealership_greeting_route_sales
        name: Route to sales
        caller_goal: Caller asks for sales and wants to know whether this is the dealership.
        mandatory: true
        expected:
          transcript_assertions: [KI, Verkauf]
          guards: [ki_disclosure_first_turn, no_tool_leakage]
  - id: inventory_lookup
    name: Vehicle inventory lookup
    category: sales
    description: Search available vehicles and answer grounded questions by make, model, budget, drivetrain, fuel type, and body style.
    tools:
      - name: search_inventory
        required: false
        description: Ground vehicle availability, price, and trim answers in current inventory.
    slots: [make, model, budget, fuel_type, body_style, transmission, availability_window]
    variables: [inventory_source, price_disclaimer, sales_callback_policy]
    guards:
      - id: inventory_grounding
        description: Availability and prices must be qualified as current-system results, not guaranteed until staff confirmation.
        applies_to: [search_inventory]
      - id: no_financing_promises
        description: Financing rates, approvals, and trade-in values require staff review.
        forbidden_behaviors: ["Promise credit approval.", "Guarantee a trade-in value."]
    scenarios:
      - id: dealership_inventory_budget_lookup
        name: Budget inventory lookup
        caller_goal: Caller asks for an automatic used SUV under 25000 euros.
        mandatory: true
        expected:
          tools: [search_inventory]
          guards: [inventory_grounding, no_financing_promises]
  - id: test_drive_booking
    name: Test drive booking
    category: transaction
    description: Collect vehicle, preferred date/time, driver/contact details, and create a test-drive request after readback.
    tools:
      - name: create_test_drive
        required: true
        required_slots: [vehicle_id, customer_name, phone_number, appointment_date, appointment_time]
        optional_slots: [email, notes]
    slots: [vehicle_id, customer_name, phone_number, appointment_date, appointment_time, email, notes]
    variables: [test_drive_duration_minutes, license_requirement_text, appointment_buffer_minutes]
    guards:
      - id: readback_before_commit
        description: Repeat vehicle, date/time, and contact data before creating the appointment.
        applies_to: [create_test_drive]
      - id: license_boundary
        description: Remind caller that valid license and dealer confirmation may be required.
        applies_to: [create_test_drive]
    scenarios:
      - id: dealership_test_drive_confirmed
        name: Confirmed test drive
        caller_goal: Caller wants to test drive a Golf tomorrow afternoon and confirms the readback.
        mandatory: true
        required_data:
          vehicle_id: example_golf
          customer_name: Schneider
        expected:
          tools: [create_test_drive]
          final_state: confirmed
          guards: [readback_before_commit, license_boundary]
  - id: service_appointment
    name: Workshop service appointment
    category: transaction
    description: Book maintenance, repair, inspection, tire, and recall appointments with vehicle and contact details.
    tools:
      - name: create_service_appointment
        required: true
        required_slots: [vehicle_model, service_reason, appointment_date, customer_name, phone_number]
        optional_slots: [license_plate, mileage, vin]
    slots: [vehicle_model, license_plate, mileage, vin, service_reason, appointment_date, appointment_time, customer_name, phone_number]
    variables: [service_hours, loaner_policy, emergency_repair_policy]
    guards:
      - id: service_readback_before_commit
        description: Confirm service reason, date/time, vehicle, and contact details before commit.
        applies_to: [create_service_appointment]
      - id: no_repair_diagnosis
        description: Capture symptoms but do not diagnose mechanical failures or quote final repair cost.
        forbidden_behaviors: ["Diagnose the fault as certain.", "Promise a final repair price."]
    scenarios:
      - id: dealership_service_inspection
        name: Inspection appointment
        caller_goal: Caller needs an inspection appointment for a BMW next week.
        mandatory: true
        expected:
          tools: [create_service_appointment]
          guards: [service_readback_before_commit, no_repair_diagnosis]
  - id: trade_in_lead
    name: Trade-in lead capture
    category: lead
    description: Capture trade-in vehicle details and route to sales without valuing the vehicle.
    tools:
      - name: capture_trade_in_lead
        required: false
        required_slots: [make, model, year, mileage, customer_name, phone_number]
    slots: [make, model, year, mileage, condition, customer_name, phone_number, desired_vehicle]
    variables: [trade_in_review_sla, photo_upload_policy]
    guards:
      - id: no_trade_in_value_promise
        description: Do not quote or guarantee value; staff must review vehicle details.
        forbidden_behaviors: ["State a binding trade-in price."]
    scenarios:
      - id: dealership_trade_in_capture
        name: Trade-in intake
        caller_goal: Caller wants to trade in a 2018 Audi A4 with 90000 km.
        mandatory: true
        expected:
          tools: [capture_trade_in_lead]
          guards: [no_trade_in_value_promise]
  - id: dealership_escalation
    name: Financing, complaints, disputes, and human handoff
    category: escalation
    description: Capture sensitive commercial or complaint topics and transfer or schedule a staff callback.
    tools:
      - name: transfer_to_human
        required: false
        required_slots: [issue_type]
        optional_slots: [customer_name, phone_number, notes]
    slots: [issue_type, customer_name, phone_number, notes, preferred_callback_time]
    variables: [handoff_phone, escalation_hours, callback_sla]
    guards:
      - id: sensitive_topic_handoff
        description: Legal, warranty, accident, payment, financing, and complaint cases require staff handoff.
        applies_to: [transfer_to_human]
    scenarios:
      - id: dealership_financing_handoff
        name: Financing handoff
        caller_goal: Caller asks whether financing will be approved and wants exact monthly payments.
        mandatory: true
        expected:
          tools: [transfer_to_human]
          guards: [sensitive_topic_handoff]
